#============================================================================
# FluentBit Parser Configuration - Structured Log Formats
# All parsers support timestamps WITHOUT milliseconds (Python logger compat)
# Time_Keep is enabled on all to preserve original timestamp field
#============================================================================

[PARSER]
    Name        docker
    Format      json
    # Docker daemon JSON format with ISO8601 timestamps including milliseconds
    # Example: {"time":"2026-03-09T17:57:39.123456789Z",...}
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On

[PARSER]
    Name        app_logs
    Format      regex
    # MovAI app logging format
    # Format: [LEVEL][YYYY-MM-DD HH:MM:SS][module][function][lineno]: [user_log:VALUE] MESSAGE
    # Timestamp precision: SECONDS ONLY (no milliseconds)
    # Fields in square brackets may contain escaped closing bracket ("\]")
    # Example: [INFO][2026-03-09 17:57:39][mymodule][my_function][42]: [user_log:important] Something happened
    # Reference: https://github.com/MOV-AI/movai-core-shared/blob/main/tests/test_logging.py
    # Extracted fields: level, timestamp, module, funcName, user_log (optional), message, lineno
    Regex       ^\[(?<level>[A-Z]+)\]\[(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}(?:\.\d{3})?)\]\[(?<module>(?:\\\]|[^\]])*?)\]\[(?<funcName>(?:\\\]|[^\]])*?)\]\[(?<lineno>\d+)\]:\s*(?:\[user_log:(?<user_log>(?:\\\]|[^\]])*?)\]\s*)?(?<message>.*)$
    Time_Key    timestamp
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   On

[PARSER]
    Name        python_structured
    Format      regex
    # Python standard logging format (logging module with custom formatter)
    # Format: [LEVEL][YYYY-MM-DD HH:MM:SS][module][funcName][tags][lineno]: message
    # Timestamp precision: SECONDS ONLY (no milliseconds)
    # Timestamp separator: Supports both comma (,mmm) and dot (.mmm) if milliseconds present
    # Example: [INFO][2026-03-09 17:57:39][mymodule][my_function][device:test][42]: Something happened
    # Extracted fields: level, timestamp, module, funcName, tags, message, lineno
    Regex       ^\[(?<level>[A-Z]+)\]\[(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}(?:[,\.]\d{3})?)\]\[(?<module>(?:\\]|[^\]])*)\]\[(?<funcName>(?:\\]|[^\]])*)\]\[(?<tags>(?:\\]|[^\]])*)\]\[(?<lineno>\d+)\]:\s*(?<message>.*)$
    Time_Key    timestamp
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   On

[PARSER]
    Name        callback_logs
    Format      regex
    # MovAI Callback system logging format with dynamic tag support
    # Format: [LEVEL][YYYY-MM-DD HH:MM:SS][module][function][lineno]: [tag:value|tag:value|...] MESSAGE
    # Timestamp precision: SECONDS ONLY (no milliseconds)
    # Tag format: Pipe-separated key:value pairs, e.g., ui:True|node:worker-01
    # Example: [INFO][2026-03-09 17:57:39][callback_mgr][execute][42]: [ui:True|node:worker-01] Callback executed
    # Extracted fields: level, timestamp, module, funcName, tags, message, lineno
    # Post-processing: Use parse_callback_tags.lua to extract ui and node fields
    # Lua filter adds: ui (True|False), node (string), has_ui (bool), has_node (bool), log (ANSI stripped)
    Regex       ^\[(?<level>[A-Z]+)\]\[(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}(?:\.\d{3})?)\]\[(?<module>[^\]]+)\]\[(?<funcName>[^\]]+)\]\[(?<lineno>[0-9]+)\]:\s*\[(?<tags>[^\]]*)\]\s*(?<message>.*)$
    Time_Key    timestamp
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   On
