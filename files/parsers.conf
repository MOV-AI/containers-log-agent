[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On

[PARSER]
    Name        app_logs
    Format      regex
    # Log format:
    # [LEVEL][YYYY-MM-DD HH:MM:SS][module][function][lineno]: [user_log:VALUE] MESSAGE
    # Fields in square brackets may contain an escaped closing bracket ("\]").
    Regex       ^\[(?<level>[A-Z]+)\]\[(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\]\[(?<module>(?:\\]|[^\]])*)\]\[(?<funcName>(?:\\]|[^\]])*)\]\[(?<lineno>\d+)\]:\s*\[user_log:(?<user_log>(?:\\]|[^\]])*)\]\s*(?<message>.*)$
    Time_Key    timestamp
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   On
