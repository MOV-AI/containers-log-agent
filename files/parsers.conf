[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On

[PARSER]
    Name        app_logs
    Format      regex
    # Log format:
    # [LEVEL][YYYY-MM-DD HH:MM:SS][module][function][lineno]: [user_log:VALUE] MESSAGE (with user_log)
    # [LEVEL][YYYY-MM-DD HH:MM:SS][module][function][lineno]: MESSAGE (without user_log)
    # Fields in square brackets may contain an escaped closing bracket ("\]").
    # Ref: https://github.com/MOV-AI/movai-core-shared/blob/main/tests/test_logging.py
    Regex       ^\[(?<level>[A-Z]+)\]\[(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\]\[(?<module>(?:\\]|[^\]])*)\]\[(?<funcName>(?:\\]|[^\]])*)\]\[(?<lineno>\d+)\]:\s*(?:\[user_log:(?<user_log>(?:\\]|[^\]])*)\]\s*)?(?<message>.*)$
    Time_Key    timestamp
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   On

[PARSER]
    Name        python_structured
    Format      regex
    # Python structured log format:
    # [levelname][asctime][module][funcName][tags][lineno]: message
    # Example: [INFO][2026-03-04 12:34:56,123][mymodule][my_function][device:test][42]: Something happened
    Regex       ^\[(?<levelname>[A-Z]+)\]\[(?<asctime>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}(?:,\d{3})?)\]\[(?<module>(?:\\]|[^\]])*)\]\[(?<funcName>(?:\\]|[^\]])*)\]\[(?<tags>(?:\\]|[^\]])*)\]\[(?<lineno>\d+)\]:\s*(?<message>.*)$
    Time_Key    asctime
    Time_Format %Y-%m-%d %H:%M:%S,%L
    Time_Keep   On

[PARSER]
    Name        callback_logs
    Format      regex
    # Callback log format with dynamic tags:
    # [LEVEL][YYYY-MM-DD HH:MM:SS][module][function][lineno]: [tag:value|tag:value|...] MESSAGE
    # Tag format supports: ui:(True|False), node:string_value, or other custom tags
    # Special tags extracted by parse_callback_tags.lua filter:
    #   - ui: Contains True or False if ui tag is present
    #   - node: Contains any string value if node tag is present
    #   - has_ui: Boolean flag indicating if ui tag exists with valid value
    #   - has_node: Boolean flag indicating if node tag exists
    Regex       ^\[(?<level>[A-Z]+)\]\[(?<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\]\[(?<module>[^\]]+)\]\[(?<funcName>[^\]]+)\]\[(?<lineno>[0-9]+)\]:\s*\[(?<tags>[^\]]*)\]\s*(?<message>.*)$
    Time_Key    timestamp
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   On
