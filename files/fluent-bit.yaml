# Fluent Bit Configuration - Generic (No Advanced Parsing)
# Low CPU mode: uses only generic parsers for all logs
# Service routing and structured parsing disabled
#
# Feature flags (controlled via environment variables):
#   ENABLE_COMPRESSION: snappy or off (default: snappy)
#   ENABLE_STORAGE_METRICS: on or off (default: off)
#   ENABLE_HTTP_METRICS: true or false (default: false)

env:
  # cannot be overridden by ENV vars if defined here
  # LOG_LEVEL: info
  # LOKI_HOST: loki
  # LOKI_PORT: 3100
  # DEVICE_NAME: default-device
  # APP_NAME: default-app
  FLUSH_INTERVAL: 5
service:
  flush: ${FLUSH_INTERVAL}
  daemon: off
  log_level: ${LOG_LEVEL}
  http_server: ${ENABLE_HTTP_METRICS:false}
  http_listen: 0.0.0.0
  http_port: 2020
  parsers_file: /fluent-bit/etc/parsers.conf
  storage.path: /var/log/flb-storage/
  storage.sync: normal
  storage.checksum: off
  storage.max_chunks_up: 128
  storage.backlog.mem_limit: ${FLUENT_BIT_BACKLOG_MEM_LIMIT:10M}
  storage.total_limit_size: ${FLUENT_BIT_LOKI_TOTAL_LIMIT_SIZE:500M}
  storage.metrics: ${ENABLE_STORAGE_METRICS:off}

# Forward Input - Receives logs from other Fluent Bit instances or applications
pipeline:
  inputs:
    # Logs input - accepts logs via TCP socket
    - name: forward
      listen: 0.0.0.0
      port: 24224
      buffer_chunk_size: 1M
      buffer_max_size: ${FLUENT_BIT_BUFFER_MAX_SIZE:6M}
      storage.type: filesystem # Use filesystem storage for reliability

    # Metrics input - accepts metrics via TCP socket
    - name: forward
      listen: 0.0.0.0
      port: 24225
      tag: metrics.*
      buffer_chunk_size: 1M
      buffer_max_size: 6M
      storage.type: filesystem # Use filesystem storage for reliability

  filters:
    # STAGE 1: Generic parsers (fallback) for all logs
    # Applied to all services - simple and efficient
    - name: parser
      match: docker.*
      key_name: log
      parser: app_logs
      preserve_key: true
      reserve_data: true

    - name: parser
      match: docker.*
      key_name: log
      parser: docker
      preserve_key: true
      reserve_data: true

  outputs:
    # Logs output to Loki
    - name: loki
      match: "*"
      log_level: ${LOG_LEVEL}
      host: ${LOKI_HOST}
      port: ${LOKI_PORT}
      labels: source=docker
      # label_keys specifies which fields from the log record should be included as labels in Loki
      # This allows for efficient querying and filtering based on these fields.
      # Warning: including too many or high-cardinality fields (more than 100 unique values) as labels can lead to performance issues in Loki.
      label_keys: $container_name,$service,$robot,$user_log,$level
      # remove_keys specifies which fields should be removed from the log record before sending to Loki
      # This is useful for excluding fields that are not needed in Loki
      # Note: it improves performance and reduces storage costs by not sending unnecessary data.
      remove_keys: container_id,lineno,module,funcName
      line_format: key_value
      compress: ${ENABLE_COMPRESSION:snappy}
      workers: 2
      retry_limit: false
      net.dns.mode: TCP
