# Fluent Bit Configuration - Generic
env:
  # cannot be overridden by ENV vars if defined here
  # LOG_LEVEL: info
  # LOKI_HOST: loki
  # LOKI_PORT: 3100
  # DEVICE_NAME: default-device
  # APP_NAME: default-app
  FLUSH_INTERVAL: 5
service:
  flush: ${FLUSH_INTERVAL}
  daemon: off
  log_level: ${LOG_LEVEL}
  http_server: true
  http_listen: 0.0.0.0
  http_port: 2020
  parsers_file: /fluent-bit/etc/parsers.conf
  storage.path: /var/log/flb-storage/
  storage.sync: normal
  storage.checksum: off
  storage.max_chunks_up: 128
  storage.backlog.mem_limit: ${FLUENT_BIT_BACKLOG_MEM_LIMIT:10M}
  storage.total_limit_size: ${FLUENT_BIT_LOKI_TOTAL_LIMIT_SIZE:500M}
  storage.metrics: on

# Forward Input - Receives logs from other Fluent Bit instances or applications
pipeline:
  inputs:
    # Logs input - accepts logs via TCP socket
    - name: forward
      listen: 0.0.0.0
      port: 24224
      buffer_chunk_size: 1M
      buffer_max_size: ${FLUENT_BIT_BUFFER_MAX_SIZE:6M}
      storage.type: filesystem # Use filesystem storage for reliability

    # Metrics input - accepts metrics via TCP socket
    - name: forward
      listen: 0.0.0.0
      port: 24225
      tag: metrics.*
      buffer_chunk_size: 1M
      buffer_max_size: 6M
      storage.type: filesystem # Use filesystem storage for reliability

  filters:
    # STAGE 1: Identify MOV.AI services for structured log parsing
    # Re-tag backend/spawner logs to 'movai.logs' for MOV.AI-specific parsing pipeline
    # Other services keep 'docker.*' tag and go through generic parsing only
    - name: rewrite_tag
      match: docker.*
      rule:
        - "$service ^(backend|spawner)$ movai.logs false"
      emitter_name: re_emitted

    # STAGE 2: MOV.AI Structured Log Processing (backend & spawner only)
    # Pre-processing: Strip ANSI color codes and extract callback tags
    # MUST run BEFORE parsers to ensure clean data for pattern matching
    - name: lua
      match: movai.logs
      script: /fluent-bit/etc/parse_callback_tags.lua
      call: parse_callback_tags

    # Parse MOV.AI callback format with dynamic tags (ui, node, etc.)
    - name: parser
      match: movai.logs
      key_name: log
      parser: callback_logs
      preserve_key: true
      reserve_data: true

    # Parse MOV.AI Python structured logs
    - name: parser
      match: movai.logs
      key_name: log
      parser: python_structured
      preserve_key: true
      reserve_data: true

    # Normalize Python log level field for Loki labeling
    - name: modify
      match: movai.logs
      rename:
        - levelname level

    # STAGE 3: Generic parsers for all services (fallback)
    # Applied to both MOV.AI logs (after structured parsing) and other services
    - name: parser
      match: docker.*
      key_name: log
      parser: app_logs
      preserve_key: true
      reserve_data: true

    - name: parser
      match: docker.*
      key_name: log
      parser: docker
      preserve_key: true
      reserve_data: true

  outputs:
    # Logs output to Loki
    - name: loki
      match: "*"
      log_level: ${LOG_LEVEL}
      host: ${LOKI_HOST}
      port: ${LOKI_PORT}
      labels: source=docker
      label_keys: $container_name,$service,$robot,$user_log,$ui,$has_ui,$has_node,$level
      remove_keys: container_id
      line_format: key_value
      compress: snappy
      workers: 2
      retry_limit: false
      net.dns.mode: TCP

    # # Logs output to InfluxDB (optional)
    # - name: influxdb
    #   match: docker.*
    #   storage.total_limit_size: ${FLUENT_BIT_INFLUXDB_TOTAL_LIMIT_SIZE:500M}
    #   host: ${INFLUXDB_HOST:localhost}
    #   port: ${INFLUXDB_PORT:8086}
    #   http_user: ${INFLUXDB_USER:}
    #   http_passwd: ${INFLUXDB_PASSWD:}
