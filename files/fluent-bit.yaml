# Fluent Bit Configuration - Generic
env:
  # cannot be overridden by ENV vars if defined here
  # LOG_LEVEL: info
  # LOKI_HOST: loki
  # LOKI_PORT: 3100
  # DEVICE_NAME: default-device
  # APP_NAME: default-app
  FLUSH_INTERVAL: 5
service:
  flush: ${FLUSH_INTERVAL}
  daemon: off
  log_level: ${LOG_LEVEL}
  http_server: true
  http_listen: 0.0.0.0
  http_port: 2020
  parsers_file: /fluent-bit/etc/parsers.conf

# Storage configuration for reliability
storage:
  path: /var/log/flb-storage/
  sync: normal
  checksum: off
  max_chunks_up: 128
  backlog_mem_limit: ${FLUENT_BIT_BACKLOG_MEM_LIMIT:10M}
  total_limit_size: ${FLUENT_BIT_TOTAL_LIMIT_SIZE:500M}

# Forward Input - Receives logs from other Fluent Bit instances or applications
pipeline:
  inputs:
    # Logs input - accepts logs via TCP socket
    - name: forward
      listen: 0.0.0.0
      port: 24224
      buffer_chunk_size: 1M
      buffer_max_size: ${FLUENT_BIT_BUFFER_MAX_SIZE:6M}

    # Metrics input - accepts metrics via TCP socket
    - name: forward
      listen: 0.0.0.0
      port: 24225
      tag: metrics.*
      buffer_chunk_size: 1M
      buffer_max_size: 6M

  filters:
    # Lua filter to strip ANSI color codes from log field
    # Must run BEFORE parsers so all parsers work with clean data
    # Also extracts ui and node tags from callback_logs format
    - name: lua
      match: docker.*
      script: /fluent-bit/etc/parse_callback_tags.lua
      call: parse_callback_tags

    - name: parser
      match: docker.*
      key_name: log
      parser: callback_logs
      preserve_key: true
      reserve_data: true

    - name: parser
      match: docker.*
      key_name: log
      parser: python_structured
      preserve_key: true
      reserve_data: true

    - name: parser
      match: docker.*
      key_name: log
      parser: app_logs
      preserve_key: true
      reserve_data: true

    - name: parser
      match: docker.*
      key_name: log
      parser: docker
      preserve_key: true
      reserve_data: true

  outputs:
    # Logs output to Loki
    - name: loki
      match: docker.*
      log_level: ${LOG_LEVEL}
      host: ${LOKI_HOST}
      port: ${LOKI_PORT}
      labels: source=docker
      label_keys: $container_name,$service,$robot,$user_log,$ui,$node,$has_ui,$has_node,$tags,$level,$module,$funcName,$lineno
      remove_keys: container_id
      line_format: key_value
      compress: snappy
      workers: 2
      retry_limit: false
      net.dns.mode: TCP

    # # Logs output to InfluxDB (optional)
